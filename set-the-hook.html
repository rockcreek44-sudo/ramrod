<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2° Baits - Set the Hook</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>
  <main class="app-shell">
    <section class="home-screen">
      <h1>SET THE HOOK</h1>
      <p class="tagline">ONE CAST. ONE FISH. ONE LESSON.</p>
      
      <div class="field-card">
      <p class="field-header">Species</p>
      <select id="species">
    <option>Select Species</option>
    <option>Largemouth Bass</option>
    <option>Smallmouth Bass</option>
    <option>Spotted Bass</option>
    
</select>
<div class="field-card">
      <div class="field-card">
      <p class="field-header">Weight</p>
      <select id="weight">
    <option>Select Weight</option>
<option>&lt;1 lb</option>
<option>1 lb</option>
<option>2 lbs</option>
<option>3 lbs</option>
<option>4 lbs</option>
<option>5 lbs</option>
<option>6 lbs</option>
<option>7 lbs</option>
<option>8 lbs</option>
<option>9 lbs</option>
<option>10 lbs</option>
<option>11 lbs</option>
<option>12+ lbs</option>
</div>
        </select>
        </div>
          <p class="field-header">Length</p>

<select id="length">
    <option>Select Length</option>
<option>&lt;10"</option>
<option>10"</option>
<option>11"</option>
<option>12"</option>
<option>13"</option>
<option>14"</option>
<option>15"</option>
<option>16"</option>
<option>17"</option>
<option>18"</option>
<option>19"</option>
<option>20"</option>
<option>21"</option>
<option>22"</option>
<option>23"</option>
<option>24"</option>
<option>25"</option>
<option>26"</option>
<option>27"</option>
<option>28"</option>
<option>29"</option>
<option>30"+</option>
</select>
<p class="field-header">Water Temp</p>

<select id="waterTemp">
   <option>Select Water Temp</option>
<option>&lt;40°F</option>
<option>40–44°F</option>
<option>45–49°F</option>
<option>50–54°F</option>
<option>55–59°F</option>
<option>60–64°F</option>
<option>65–69°F</option>
<option>70–74°F</option>
<option>75–79°F</option>
<option>80–84°F</option>
<option>85°F+</option>
</select>        
          
          
          
          
          
          
          
          
          
          
          
          <p class="field-header">Water Clarity</p>

<select id="waterClarity">
    <option>Select Water Clarity</option>
    <option>Clear</option>
    <option>Slightly Stained</option>
    <option>Stained</option>
    <option>Muddy</option>
</select>
<p class="field-header">Weather</p>

<select id="weather">
    <option>Select Weather</option>
    <option>Sunny</option>
    <option>Partly Cloudy</option>
    <option>Cloudy</option>
    <option>Rain</option>
    <option>Storm</option>
</select>
          
<p class="field-header">Wind</p>

<select id="wind">
    <option>Select Wind</option>
    <option>Calm</option>
    <option>Light</option>
    <option>Moderate</option>
    <option>Windy</option>
</select>
          
          <p class="field-header">Bait Used</p>
          <select id="lure">
    <option>Select Lure</option>
    <option>Workhorse</option>
    <option>Mini</option>
    <option>Heavy Cover Workhorse</option>
    <option>Heavy Cover Mini</option>
    <option>Karashi</option>
    <option>Swim Jig</option>
    <option>Other</option>
</select>
<button id="saveCatch" type="button" class="enter-button">
        SET THE HOOK
</button>
        
<button type="button" class="enter-button" onclick="window.location.href='dashboard.html'">
    BACK TO DASHBOARD
</button>
          
      


    </section>
</main>

</body>
  <script src="script.js?v=20260720-3"></script>
</html>
